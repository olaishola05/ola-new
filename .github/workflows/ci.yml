name: Build CI

on:
  push:
    branches: ["**"]

  pull_request:
    branches: ["main", "staging", "dev"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env.local from secret
        run: |
          cat << 'EOF' > .env.local
          ${{ secrets.ENV_FILE }}
          EOF

      - name: Debug env file
        run: cat .env.local | sed 's/=.*/=***hidden***/'

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Build
        run: npm run build

      - name: Upload .next build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
